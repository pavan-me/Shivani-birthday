<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Happy Birthday Shivani 🎂</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Lato:wght@300;400&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
:root{--rose:#c8556a;--gold:#d4a855;--deep:#110608}
body{background:var(--deep);color:#f5e6ea;font-family:'Lato',sans-serif;font-weight:300;overflow-x:hidden}
.stars,.petals{position:fixed;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:0;overflow:hidden}
.star{position:absolute;width:2px;height:2px;background:#fff;border-radius:50%;animation:twinkle ease-in-out infinite}
@keyframes twinkle{0%,100%{opacity:.1}50%{opacity:.8}}
.petal{position:absolute;border-radius:0 50% 50% 50%;opacity:0;animation:fall linear infinite}
@keyframes fall{0%{opacity:0;transform:translateY(-20px) rotate(0deg)}10%{opacity:.6}90%{opacity:.3}100%{opacity:0;transform:translateY(100vh) rotate(720deg) translateX(60px)}}
.hero{position:relative;min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:60px 24px;z-index:1}
.hero::before{content:'';position:absolute;inset:0;background:radial-gradient(ellipse at center,rgba(200,85,106,.18) 0%,transparent 70%);pointer-events:none}
.date-tag{font-size:11px;letter-spacing:4px;text-transform:uppercase;color:var(--gold);margin-bottom:20px;opacity:0;animation:fadeUp 1s ease .3s forwards}
.hero h1{font-family:'Playfair Display',serif;font-size:clamp(2.8rem,10vw,6rem);line-height:1.1;color:#fff;opacity:0;animation:fadeUp 1s ease .6s forwards}
.hero h1 span{color:var(--rose);font-style:italic}
.hero .sub{margin-top:18px;font-size:clamp(.9rem,3vw,1.1rem);color:rgba(255,255,255,.55);letter-spacing:1.5px;opacity:0;animation:fadeUp 1s ease .9s forwards}
.photos{position:relative;margin:48px auto 0;width:260px;height:320px;opacity:0;animation:fadeUp 1s ease 1.2s forwards}
.frame{position:absolute;border-radius:16px;overflow:hidden;box-shadow:0 20px 60px rgba(0,0,0,.6);border:2px solid rgba(200,85,106,.3)}
.frame img{width:100%;height:100%;object-fit:cover;display:block}
.frame-1{width:180px;height:240px;top:0;left:0;transform:rotate(-4deg);z-index:2;transition:transform .4s ease}
.frame-2{width:160px;height:210px;bottom:0;right:0;transform:rotate(5deg);z-index:1;transition:transform .4s ease}
.frame-1:hover{transform:rotate(0) scale(1.05);z-index:10}
.frame-2:hover{transform:rotate(0) scale(1.05);z-index:10}
.gold-line{width:60px;height:2px;background:var(--gold);margin:48px auto 0;opacity:0;animation:fadeUp 1s ease 1.5s forwards}
section{position:relative;z-index:1;max-width:680px;margin:0 auto;padding:60px 28px;text-align:center}
section h2{font-family:'Playfair Display',serif;font-size:clamp(1.6rem,5vw,2.4rem);color:#fff;margin-bottom:20px}
section h2 em{color:var(--rose);font-style:italic}
section p{font-size:clamp(.9rem,3vw,1.05rem);line-height:1.95;color:rgba(255,255,255,.65);margin-bottom:16px}
.highlight{display:inline-block;background:rgba(200,85,106,.15);border-left:3px solid var(--rose);padding:18px 24px;border-radius:0 12px 12px 0;text-align:left;font-family:'Playfair Display',serif;font-style:italic;font-size:clamp(1rem,3.5vw,1.2rem);color:#f5e6ea;margin:24px 0;line-height:1.7}
.memory-card{background:rgba(255,255,255,.04);border:1px solid rgba(200,85,106,.2);border-radius:20px;padding:32px 28px;margin:16px 0;text-align:left;transition:border-color .3s ease,background .3s ease}
.memory-card:hover{border-color:rgba(200,85,106,.5);background:rgba(200,85,106,.06)}
.memory-card .icon{font-size:1.8rem;margin-bottom:10px}
.memory-card h3{font-family:'Playfair Display',serif;font-size:1.1rem;color:var(--gold);margin-bottom:8px}
.memory-card p{color:rgba(255,255,255,.6);font-size:.92rem;margin:0;line-height:1.75}
.finale{text-align:center;padding:70px 28px 100px;position:relative;z-index:1;max-width:680px;margin:0 auto}
.finale h2{font-family:'Playfair Display',serif;font-size:clamp(2rem,6vw,3.2rem);color:#fff;margin-bottom:16px}
.finale h2 em{color:var(--rose)}
.finale p{font-size:1rem;color:rgba(255,255,255,.55);max-width:480px;margin:0 auto 24px;line-height:1.9}
.btn{display:inline-block;padding:16px 40px;border:2px solid var(--rose);border-radius:50px;color:#fff;text-decoration:none;font-size:.9rem;letter-spacing:2px;text-transform:uppercase;transition:background .3s ease;cursor:pointer;background:transparent;font-family:'Lato',sans-serif}
.btn:hover{background:var(--rose)}
.divider{width:100%;max-width:400px;margin:0 auto;border:none;border-top:1px solid rgba(200,85,106,.15);display:block}
@keyframes fadeUp{from{opacity:0;transform:translateY(30px)}to{opacity:1;transform:translateY(0)}}
.reveal{opacity:0;transform:translateY(40px);transition:opacity .8s ease,transform .8s ease}
.revealed{opacity:1;transform:translateY(0)}
</style>
</head>

<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
:root{--rose:#c8556a;--gold:#d4a855;--deep:#110608}
body{background:var(--deep);color:#f5e6ea;font-family:'Lato',sans-serif;font-weight:300;overflow-x:hidden}
.stars,.petals{position:fixed;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:0;overflow:hidden}
.star{position:absolute;width:2px;height:2px;background:#fff;border-radius:50%;animation:twinkle ease-in-out infinite}
@keyframes twinkle{0%,100%{opacity:.1}50%{opacity:.8}}
.petal{position:absolute;border-radius:0 50% 50% 50%;opacity:0;animation:fall linear infinite}
@keyframes fall{0%{opacity:0;transform:translateY(-20px) rotate(0deg)}10%{opacity:.6}90%{opacity:.3}100%{opacity:0;transform:translateY(100vh) rotate(720deg) translateX(60px)}}
.hero{position:relative;min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:60px 24px;z-index:1}
.hero::before{content:'';position:absolute;inset:0;background:radial-gradient(ellipse at center,rgba(200,85,106,.18) 0%,transparent 70%);pointer-events:none}
.date-tag{font-size:11px;letter-spacing:4px;text-transform:uppercase;color:var(--gold);margin-bottom:20px;opacity:0;animation:fadeUp 1s ease .3s forwards}
.hero h1{font-family:'Playfair Display',serif;font-size:clamp(2.8rem,10vw,6rem);line-height:1.1;color:#fff;opacity:0;animation:fadeUp 1s ease .6s forwards}
.hero h1 span{color:var(--rose);font-style:italic}
.hero .sub{margin-top:18px;font-size:clamp(.9rem,3vw,1.1rem);color:rgba(255,255,255,.55);letter-spacing:1.5px;opacity:0;animation:fadeUp 1s ease .9s forwards}
.photos{position:relative;margin:48px auto 0;width:260px;height:320px;opacity:0;animation:fadeUp 1s ease 1.2s forwards}
.frame{position:absolute;border-radius:16px;overflow:hidden;box-shadow:0 20px 60px rgba(0,0,0,.6);border:2px solid rgba(200,85,106,.3)}
.frame img{width:100%;height:100%;object-fit:cover;display:block}
.frame-1{width:180px;height:240px;top:0;left:0;transform:rotate(-4deg);z-index:2;transition:transform .4s ease}
.frame-2{width:160px;height:210px;bottom:0;right:0;transform:rotate(5deg);z-index:1;transition:transform .4s ease}
.frame-1:hover{transform:rotate(0) scale(1.05);z-index:10}
.frame-2:hover{transform:rotate(0) scale(1.05);z-index:10}
.gold-line{width:60px;height:2px;background:var(--gold);margin:48px auto 0;opacity:0;animation:fadeUp 1s ease 1.5s forwards}
section{position:relative;z-index:1;max-width:680px;margin:0 auto;padding:60px 28px;text-align:center}
section h2{font-family:'Playfair Display',serif;font-size:clamp(1.6rem,5vw,2.4rem);color:#fff;margin-bottom:20px}
section h2 em{color:var(--rose);font-style:italic}
section p{font-size:clamp(.9rem,3vw,1.05rem);line-height:1.95;color:rgba(255,255,255,.65);margin-bottom:16px}
.highlight{display:inline-block;background:rgba(200,85,106,.15);border-left:3px solid var(--rose);padding:18px 24px;border-radius:0 12px 12px 0;text-align:left;font-family:'Playfair Display',serif;font-style:italic;font-size:clamp(1rem,3.5vw,1.2rem);color:#f5e6ea;margin:24px 0;line-height:1.7}
.memory-card{background:rgba(255,255,255,.04);border:1px solid rgba(200,85,106,.2);border-radius:20px;padding:32px 28px;margin:16px 0;text-align:left;transition:border-color .3s ease,background .3s ease}
.memory-card:hover{border-color:rgba(200,85,106,.5);background:rgba(200,85,106,.06)}
.memory-card .icon{font-size:1.8rem;margin-bottom:10px}
.memory-card h3{font-family:'Playfair Display',serif;font-size:1.1rem;color:var(--gold);margin-bottom:8px}
.memory-card p{color:rgba(255,255,255,.6);font-size:.92rem;margin:0;line-height:1.75}
.finale{text-align:center;padding:70px 28px 100px;position:relative;z-index:1;max-width:680px;margin:0 auto}
.finale h2{font-family:'Playfair Display',serif;font-size:clamp(2rem,6vw,3.2rem);color:#fff;margin-bottom:16px}
.finale h2 em{color:var(--rose)}
.finale p{font-size:1rem;color:rgba(255,255,255,.55);max-width:480px;margin:0 auto 24px;line-height:1.9}
.btn{display:inline-block;padding:16px 40px;border:2px solid var(--rose);border-radius:50px;color:#fff;text-decoration:none;font-size:.9rem;letter-spacing:2px;text-transform:uppercase;transition:background .3s ease;cursor:pointer;background:transparent;font-family:'Lato',sans-serif}
.btn:hover{background:var(--rose)}
.divider{width:100%;max-width:400px;margin:0 auto;border:none;border-top:1px solid rgba(200,85,106,.15);display:block}
@keyframes fadeUp{from{opacity:0;transform:translateY(30px)}to{opacity:1;transform:translateY(0)}}
.reveal{opacity:0;transform:translateY(40px);transition:opacity .8s ease,transform .8s ease}
.revealed{opacity:1;transform:translateY(0)}
</style>
</head>
